name: Playwright E2E

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]

permissions: read-all

jobs:
  playwright:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      APP_SECRET: ${{ secrets.APP_SECRET }}
      FIREBASE_ADMIN_SA_BASE64: ${{ secrets.FIREBASE_ADMIN_SA }}
      NEXT_PUBLIC_E2E: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          for v in SUPABASE_URL APP_SECRET; do
            if [ -z "${!v:-}" ]; then
              missing+=($v)
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "ERROR: Missing required secrets: ${missing[*]}"
            echo "Please add them to Repository → Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies (Python 3.10)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3.10 python3-pip

      - name: Install Python face recognition dependencies
        run: |
          cd scripts
          python3.10 -m pip install -r requirements.txt

      - name: Install deps
        run: npm ci

      - name: Decode service account (bash)
        if: runner.os != 'Windows'
        run: |
          if [ -z "${FIREBASE_ADMIN_SA_BASE64:-}" ]; then
            echo "FIREBASE_ADMIN_SA_BASE64 secret is missing"
            exit 1
          fi
          echo "$FIREBASE_ADMIN_SA_BASE64" | base64 --decode > service-account.json
          ls -la service-account.json
        shell: bash

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        shell: bash
        
      - name: Start Python face recognition service
        run: |
          cd scripts
          python3.10 face_service.py &
          echo "Waiting for Python service to start..."
          sleep 10
        shell: bash

      - name: Build Next.js
        run: npm run build

      - name: Start app (background)
        run: |
          npm run start &> server.log &
          echo "Waiting for server to be ready..."
          npx wait-on http://localhost:3000 --timeout 60000
        shell: bash

      - name: Debug (non-secret)
        run: |
          echo "Files:"
          ls -la
          node -v
          npx playwright --version || true
        shell: bash

      - name: Run Playwright tests
        run: npx playwright test --config=playwright.config.cjs
        shell: bash

      - name: Debug server logs on failure
        if: failure()
        run: |
          echo "=== Server logs (if any) ==="
          if [ -f server.log ]; then
            echo "server.log found → printing:"
            cat server.log
          else
            echo "server.log: not found"
          fi

          # also print process list and recent journalctl (if available)
          echo "=== ps aux (top lines) ==="
          ps aux | head -n 30 || true