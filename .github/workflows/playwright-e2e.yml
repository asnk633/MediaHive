name: Playwright E2E Tests

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    env:
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      PLAYWRIGHT_TEST_EMAIL: dev@local
      NEXT_PUBLIC_E2E: 1
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3 python3-pip
      - name: Install Python face recognition dependencies
        run: |
          cd scripts
          pip3 install -r requirements.txt
      - name: Start Python face recognition service
        run: |
          cd scripts
          python3 face_service.py &
          echo "Waiting for Python service to start..."
          sleep 10
      - name: Install dependencies
        run: npm ci
      - name: Build Next.js
        run: npm run build
      - name: Start server in background
        run: |
          npm run start &> server.log &
          echo "Waiting for server to be ready..."
          npx wait-on http://localhost:3000 --timeout 60000
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test --config=playwright.config.cjs
      - name: Run M6 specific tests
        run: |
          npx playwright test ai-assistant.spec.ts monitoring.spec.ts perf.spec.ts offline.spec.ts locks.spec.ts task-activity.spec.ts notification-rules.spec.ts --config=playwright.config.cjs
      - name: Run M8 specific tests
        run: |
          npx playwright test media.analyze.spec.ts face.vips.spec.ts face.privacy.spec.ts --config=playwright.config.cjs
      - name: Run offline mode tests
        run: |
          npx playwright test --project=offline-mode --config=playwright.config.cjs
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.node-version }}
          path: |
            test-results/
          retention-days: 30
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ matrix.node-version }}
          path: test-results/html-report/
          retention-days: 30
      - name: Upload SSE/WS connection logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: connection-logs-${{ matrix.node-version }}
          path: connection-logs/
          retention-days: 30
      - name: Debug server logs on failure
        if: failure()
        run: |
          echo "=== Server Logs ==="
          cat server.log