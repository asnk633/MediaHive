name: "E2E - Mocked UI Tests (pull_request)"

# Only run for PRs so it doesn't affect main branch builds
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

env:
  # Force mock mode in CI so Playwright uses mocked Firebase + WebView
  NODE_ENV: test
  USE_REAL_FIREBASE: "false"
  MOCK_FIREBASE: "true"
  MOCK_WEBVIEW: "true"

  # Provide minimal fake NEXT_PUBLIC_FIREBASE_* values so check-envs doesn't fail
  NEXT_PUBLIC_FIREBASE_API_KEY: "ci_dummy_api_key"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "ci_dummy.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "ci_dummy_project"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "ci_dummy_bucket"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "1234567890"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:123:web:ci_dummy"

  # Provide a file DB so DB seeding/connection checks don't blow up
  DATABASE_URL: "file:./ci.db"

jobs:
  e2e-mocked:
    name: E2E - Mocked UI Tests
    runs-on: ubuntu-latest
    concurrency:
      group: "e2e-mocked-${{ github.head_ref || github.run_id }}"
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Show repo root (diagnostics)
        run: |
          echo "GITHUB_REF: $GITHUB_REF"
          echo "GITHUB_SHA: $GITHUB_SHA"
          pwd
          ls -la
          echo "show root file list:"
          ls -la .

      - name: Install dependencies (robust)
        shell: bash
        run: |
          # Prefer frozen (CI-safe). If lockfile is missing or incompatible, fallback to a safe install.
          if [ -f pnpm-lock.yaml ]; then
            echo "pnpm-lock.yaml found — trying frozen install"
            pnpm install --frozen-lockfile || {
              echo "Frozen failed, trying non-frozen install"
              pnpm install --reporter=ndjson
            }
          else
            echo "pnpm-lock.yaml not found — creating lockfile then install"
            pnpm install --no-frozen-lockfile || {
              echo "pnpm install failed; printing pnpm version and list"
              pnpm -v
              pnpm list --depth 0 || true
              exit 1
            }
          fi
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: false

      - name: Verify jest binary
        run: |
          if [ -x ./node_modules/.bin/jest ]; then
            echo "jest binary found"
          else
            echo "jest missing — listing node_modules top level"
            ls -la node_modules | sed -n '1,200p'
            exit 1
          fi

      - name: Verify installed (diagnostics)
        run: |
          echo "node: $(node -v)  npm: $(npm -v) pnpm: $(pnpm -v)"
          ls -la node_modules || true
          ls -la node_modules/.bin || true
          pnpm list --depth 0 || true

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Ensure local CI DB exists
        run: |
          # Create an empty sqlite file (used by DATABASE_URL file:./ci.db)
          mkdir -p .ci
          touch ci.db || true
        shell: bash

      - name: Start dev server in background
        run: |
          # Start the dev server in background
          nohup pnpm dev > dev-server.log 2>&1 &
          echo $! > dev-server.pid
          
          # Wait for server to be ready (max 60 seconds)
          echo "Waiting for dev server to start..."
          for i in {1..60}; do
            if curl -s http://127.0.0.1:3000 > /dev/null; then
              echo "Dev server is ready!"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Dev server failed to start within 60 seconds"
              cat dev-server.log
              exit 1
            fi
            sleep 1
          done
        shell: bash
        env:
          MOCK_FIREBASE: "true"
          USE_REAL_FIREBASE: "false"

      - name: Run Playwright tests
        run: |
          # Run smoke tests from correct directory (matches testDir config)
          pnpm exec playwright test smoke.spec.ts --retries=1 --reporter=list
        shell: bash
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

      - name: Stop dev server
        if: always()
        run: |
          if [ -f dev-server.pid ]; then
            kill $(cat dev-server.pid) || true
          fi
          # Show server logs if tests failed
          if [ -f dev-server.log ]; then
            echo "=== Dev Server Logs ==="
            cat dev-server.log
          fi
        shell: bash