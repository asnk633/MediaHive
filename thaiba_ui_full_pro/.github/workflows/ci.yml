name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  rules-tests:
    name: Firestore rules & integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci
          npm install -D @firebase/rules-unit-testing firebase-admin

      - name: Run Firestore rule + integration tests (with coverage)
        env:
          CI: true
        run: |
          npx jest src/__tests__/firestore.rules.test.ts src/__tests__/firestore.integration.test.ts --runInBand --coverage --coverageDirectory=coverage/rules

      - name: Upload rules coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: rules-coverage
          path: coverage/rules

  ui-tests:
    name: UI unit tests (jsdom) + coverage + codecov
    runs-on: ubuntu-latest
    needs: rules-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run UI tests & coverage
        env:
          CI: true
        run: |
          npx jest --testPathIgnorePatterns="firestore.rules.test|firestore.integration.test" --coverage --coverageDirectory=coverage/ui

      - name: Upload UI coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-coverage
          path: coverage/ui

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/ui/**/lcov.info
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
