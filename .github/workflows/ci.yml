name: CI

on:
  pull_request:
    branches:
      - main
      - ci/fix-workflows
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    env:
      NODE_OPTIONS: --max-old-space-size=2048
      BASE_URL: http://127.0.0.1:3000

      # Supabase (backend / API)
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      APP_SECRET: ${{ secrets.APP_SECRET }}

      # Firebase client (Next.js app)
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies (robust)
        shell: bash
        run: |
          set -euo pipefail
          echo "---- repo files (top) ----"
          ls -la | sed -n '1,200p'
          echo "---- check lockfiles ----"
          if [ -f pnpm-lock.yaml ]; then
            echo "pnpm-lock.yaml found — trying frozen install"
            # ensure pnpm available via action or installed prior
            pnpm --version || corepack prepare pnpm@latest --activate
            pnpm install --frozen-lockfile --reporter=append-only
          else
            echo "pnpm-lock.yaml NOT found — generating or falling back"
            pnpm --version || corepack prepare pnpm@latest --activate
            # Try to create lockfile but keep deterministic: prefer CI-safe generation
            pnpm install --no-frozen-lockfile --reporter=append-only
            # optionally, commit lockfile in a follow-up PR, but avoid failing CI here
          fi

          echo "node and npm info:"
          node -v
          pnpm -v
          echo "ls node_modules top"
          ls -la node_modules | sed -n '1,200p'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run unit + UI tests
        run: npm test

      - name: Build Next.js
        run: npm run build