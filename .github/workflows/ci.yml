name: CI

on:
  pull_request:
    branches:
      - main
      - ci/fix-workflows
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    env:
      NODE_OPTIONS: --max-old-space-size=2048
      BASE_URL: http://127.0.0.1:3000

      # Supabase (backend / API)
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      APP_SECRET: ${{ secrets.APP_SECRET }}

      # Firebase client (Next.js app)
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: |
          # Create a lockfile if missing (CI) then run frozen install.
          # Inline ensure-lock script to avoid 'file not found' issues
          echo "Checking for pnpm-lock.yaml..."
          if [ -f pnpm-lock.yaml ]; then
            echo "pnpm-lock.yaml already exists — nothing to do."
            exit 0
          fi

          echo "pnpm-lock.yaml not found — creating lockfile (CI-safe mode)"
          # Prefer corepack/pnpm if available, otherwise use npx to run pnpm
          if command -v pnpm >/dev/null 2>&1; then
            PNPM_BIN=pnpm
          elif command -v corepack >/dev/null 2>&1; then
            echo "corepack available — activate pnpm"
            corepack prepare pnpm@latest --activate
            PNPM_BIN=pnpm
          else
            echo "pnpm not installed; will use npx to invoke pnpm"
            PNPM_BIN="npx pnpm@latest"
          fi

          # Create the lockfile only (no full install) in a CI-friendly way.
          # Use lockfile-only with no frozen flag so it can create the lockfile deterministically.
          $PNPM_BIN install --lockfile-only --no-prefer-frozen-lockfile

          echo "pnpm-lock.yaml created"
          pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run unit + UI tests
        run: npm test

      - name: Build Next.js
        run: npm run build