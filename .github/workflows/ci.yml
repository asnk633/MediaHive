name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions: read-all

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      APP_SECRET: ${{ secrets.APP_SECRET }}
      FIREBASE_ADMIN_SA: ${{ secrets.FIREBASE_ADMIN_SA }}
      # Add other necessary secrets if referenced by ci-env-loader
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug (non-secret)
        run: |
          echo "Workspace root:"
          ls -la
          node -v || true
          python --version || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Decode Firebase service account
        run: echo "${{ secrets.FIREBASE_ADMIN_SA }}" | base64 --decode > ./service-account.json

      - name: Inject envs (from secrets)
        run: chmod +x .github/actions/ci-env-loader.sh && ./.github/actions/ci-env-loader.sh

      - name: Run Jest
        run: npx jest --passWithNoTests

      - name: Build (Next.js)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: .next
          retention-days: 1
