name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Run Jest
        run: npx jest --passWithNoTests
      - name: Run Playwright smoke
        run: npx playwright install --with-deps && npx playwright test e2e/smoke.spec.ts --project=chromium --reporter=list
