name: CI — E2E (decode SA, seed, playwright)

on:
  push:
    branches: [ main, feat/clean-finalize-v1-files ]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions: read-all

jobs:
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      NODE_OPTIONS: '--max-old-space-size=2048'
      BASE_URL: http://127.0.0.1:3000
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      APP_SECRET: ${{ secrets.APP_SECRET }}
      FIREBASE_ADMIN_SA: ${{ secrets.FIREBASE_ADMIN_SA }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        run: |
          missing=()
          for v in SUPABASE_URL APP_SECRET; do
            if [ -z "${!v:-}" ]; then
              missing+=($v)
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "ERROR: Missing required secrets: ${missing[*]}"
            echo "Please add them to Repository → Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Decode service account (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          if [ -z "${FIREBASE_ADMIN_SA:-}" ]; then
            echo "FIREBASE_ADMIN_SA secret is missing"
            exit 1
          fi
          # Write the raw JSON from the secret into a file
          printf '%s\n' "$FIREBASE_ADMIN_SA" > service-account.json
          ls -la service-account.json
        shell: bash

      - name: Decode service account (Windows)
        if: runner.os == 'Windows'
        run: |
          if (-not $env:FIREBASE_ADMIN_SA) {
            Write-Host "FIREBASE_ADMIN_SA secret is missing"
            exit 1
          }
          # Write the raw JSON from the secret into a file
          Set-Content -Path service-account.json -Value $env:FIREBASE_ADMIN_SA -Encoding UTF8
          Get-Item service-account.json | Format-List
        shell: pwsh

      - name: Set FIREBASE_ADMIN_SA_PATH for Node app
        run: echo "FIREBASE_ADMIN_SA_PATH=$(pwd)/service-account.json" >> $GITHUB_ENV
        shell: bash

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start server (background)
        run: |
          # start the app on port 3000 in background and redirect logs
          nohup npm run start --silent > app.log 2>&1 &
          echo $! > .server_pid
        shell: bash

      - name: Wait for server to be healthy
        run: |
          for i in {1..40}; do
            if curl -sSf http://127.0.0.1:3000/api/health >/dev/null 2>&1; then
              echo "server is healthy"
              exit 0
            fi
            echo "waiting for server... ($i)"
            sleep 3
          done
          echo "Server did not become healthy"
          cat app.log || true
          exit 1
        shell: bash

      - name: Seed smoke user (retry)
        id: seed
        run: |
          for i in 1 2 3; do
            echo "seed attempt $i"
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://127.0.0.1:3000/api/test-utils/seed-user \
              -H "Content-Type: application/json" \
              -d '{"email":"smoke@test.local","password":"Pass123","role":"team"}' || true)
            echo "seed http status: $HTTP_STATUS"
            if [ "$HTTP_STATUS" = "201" ] || [ "$HTTP_STATUS" = "200" ]; then
              echo "seed ok"
              exit 0
            fi
            sleep 2
          done
          echo "Seed failed; dumping server log"
          tail -n +1 app.log || true
          exit 1
        shell: bash

      - name: Generate Playwright storage state (optional)
        run: |
          mkdir -p e2e
          # Install Playwright browsers for this step too (it uses playwright)
          npx playwright install --with-deps
          BASE_URL=http://127.0.0.1:3000 E2E_TEST_EMAIL='smoke@test.local' E2E_TEST_PW='Pass123' node scripts/generateStorageState.js || true
        continue-on-error: true
        shell: bash

      - name: Run Playwright tests (single worker, retries, trace on failure)
        id: playwright
        run: |
          npx cross-env BASE_URL=http://127.0.0.1:3000 npx playwright test --retries=2 --workers=1 --trace on
        continue-on-error: true
        shell: bash

      - name: Upload Playwright traces & logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            playwright-report
            e2e-artifacts || true
            ./app.log
            ./e2e/storageState.json || true

      - name: Stop server
        if: always()
        run: |
          if [ -f .server_pid ]; then
            kill -9 $(cat .server_pid) || true
            rm -f .server_pid
          fi
        shell: bash

      - name: Fail if tests failed
        if: steps.playwright.outcome != 'success'
        run: |
          echo "Playwright tests failed. See artifacts."
          exit 1
        shell: bash
