  playwright_smoke:
    name: Playwright smoke (stable)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Inject envs (from secrets)
        run: chmod +x .github/actions/ci-env-loader.sh && ./.github/actions/ci-env-loader.sh
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          FIREBASE_ADMIN_SA: ${{ secrets.FIREBASE_ADMIN_SA }}
      - name: Build & start
        run: |
          pnpm run build
          nohup pnpm start &>/tmp/next-start.log &
      - name: Wait for server
        run: pnpm exec wait-on http://localhost:3000 --timeout 60000
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
      - name: Run smoke spec (single worker + retries)
        run: pnpm exec playwright test e2e/smoke.spec.ts --project=chromium --retries=2 --workers=1 --reporter=list
        env:
          CI: true
