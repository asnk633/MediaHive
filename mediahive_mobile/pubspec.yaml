name: mediahive_mobile
description: A new Flutter project for MediaHive.
version: 1.1.3-beta+4031


environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  lucide_icons: ^0.257.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  flutter_riverpod: ^2.4.9
  supabase_flutter: ^2.4.0
  flutter_dotenv: ^5.1.0
  go_router: ^13.2.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  riverpod_annotation: ^2.3.3
  dartz: ^0.10.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^5.0.2
  uuid: ^4.3.3
  image_picker: ^1.2.2
  file_picker: ^8.1.2
  image_cropper: ^12.2.1
  flutter_image_compress: ^2.4.0
  video_compress: ^3.1.4
  flutter_local_notifications: ^17.2.1
  audioplayers: ^6.0.0
  firebase_core: ^4.8.0
  firebase_messaging: ^16.2.1
  firebase_analytics: ^12.4.0
  intl: ^0.20.2
  lottie: ^3.1.2
  dotlottie_flutter: ^0.0.4
  custom_refresh_indicator: ^3.0.0
  share_plus: ^10.1.3
  url_launcher: ^6.3.1
  dio: ^5.7.0
  http: ^1.2.0
  path_provider: ^2.1.5
  path: ^1.9.0
  photo_view: ^0.15.0
  video_player: ^2.9.2
  chewie: ^1.8.5
  syncfusion_flutter_pdfviewer: ^33.2.6
  gal: ^2.3.0
  permission_handler: ^11.3.1
  record: ^5.1.2
  package_info_plus: ^8.0.0
  open_filex: ^4.5.0
  emoji_picker_flutter: ^4.4.0

dependency_overrides:
  record_platform_interface: 1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon_padded.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0F172A"
  image: "assets/images/logo_honey_safe.png"
  android_12:
    color: "#0F172A"
    icon_background_color: "#0F172A"
    image: "assets/images/logo_honey_safe.png"
  web: false

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/logo.png
    - assets/images/logo_honey.png
    - assets/images/logo_honey_safe.png
    - assets/images/app_icon.png
    - assets/images/app_icon_padded.png
    - assets/animations/honey_bee.json
    - assets/animations/bee_looking.json
    - assets/sounds/task_added.wav
    - assets/sounds/event_alert.wav
    - assets/sounds/success.wav
    - assets/sounds/warning.wav
    - assets/sounds/upload_complete.wav
    - assets/sounds/message_received.wav
    - assets/sounds/message_sent.wav
    - assets/sounds/voice_record_start.wav
    - assets/sounds/voice_record_stop.wav
    - assets/sounds/group_alert.wav

  fonts:
    - family: BavistaSoulvare
      fonts:
        - asset: assets/fonts/BavistaSoulvare.ttf
    - family: Muli
      fonts:
        - asset: assets/fonts/Muli-Regular.ttf
        - asset: assets/fonts/Muli-Italic.ttf
          style: italic
        - asset: assets/fonts/Muli-Bold.ttf
          weight: 700
        - asset: assets/fonts/Muli-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Muli-Light.ttf
          weight: 300
        - asset: assets/fonts/Muli-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/Muli-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Muli-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/Muli-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Muli-SemiBoldItalic.ttf
          weight: 600
          style: italic
