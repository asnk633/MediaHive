# Codemagic CI/CD Configuration for MediaHive iOS Builds
# Place this file in the root of your git repository.

workflows:
  ios-build:
    name: MediaHive iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1 # Highly performant and cost-efficient Apple Silicon builder
    
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      
    # Point directly to your mobile subdirectory
    working_directory: mediahive_mobile

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
          source: true

    scripts:
      - name: Initialize packages and submodules
        script: |
          echo "Initializing packages..."
          flutter channel stable
          flutter upgrade
          
      - name: Run Flutter Doctor
        script: |
          flutter doctor -v

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Build iOS Bundle (Unsigned)
        script: |
          # Build an iOS app bundle targeting the simulator to bypass Provisioning Profile checks
          flutter build ios --simulator

    artifacts:
      # Upload the compiled iOS app bundle and build artifacts
      - build/ios/iphonesimulator/*.app

    publishing:
      email:
        recipients:
          - admin@thaibagarden.com # Default recipient for success/failure build notifications
        notify:
          success: true
          failure: true
