name: Playwright E2E

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: read-all

jobs:
  playwright:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      APP_SECRET: ${{ secrets.APP_SECRET }}
      # Firebase client environment variables
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
      # FIREBASE_ADMIN_SA_BASE64 removed - now using FIREBASE_ADMIN_SA_PATH only
      NEXT_PUBLIC_E2E: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          for v in SUPABASE_URL APP_SECRET; do
            if [ -z "${!v:-}" ]; then
              missing+=($v)
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "ERROR: Missing required secrets: ${missing[*]}"
            echo "Please add them to Repository → Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: 'pnpm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:

      - name: Install Python face recognition dependencies
        run: |
          cd scripts
          python -m pip install -r requirements.txt

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Decode service account (bash)
        if: runner.os != 'Windows'
        run: |
          if [ -z '${{ secrets.FIREBASE_ADMIN_SA }}' ]; then
            echo "FIREBASE_ADMIN_SA secret is missing"
            exit 1
          fi
          # Decode BASE64 secret to JSON file
          echo "${{ secrets.FIREBASE_ADMIN_SA }}" | base64 --decode > service-account.json
          ls -la service-account.json
        shell: bash

      - name: Set FIREBASE_ADMIN_SA_PATH for Node app
        run: echo "FIREBASE_ADMIN_SA_PATH=$(pwd)/service-account.json" >> $GITHUB_ENV
        shell: bash

      - name: Install Playwright browsers
        run: |
          pnpm exec playwright install --with-deps
          pnpm exec playwright install-deps
        shell: bash
        
      - name: Start Python face recognition service
        run: |
          cd scripts
          python face_service.py &
          echo "Waiting for Python service to start..."
          sleep 10
        shell: bash

      - name: Build Next.js
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
        run: pnpm run build

      - name: Start app (background)
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
        run: |
          pnpm start &> server.log &
          echo "Waiting for server to be ready..."
          pnpm exec wait-on http://localhost:3000 --timeout 60000
        shell: bash

      - name: Debug (non-secret)
        run: |
          echo "Files:"
          ls -la
          node -v
          pnpm exec playwright --version || true
        shell: bash

      - name: Run Playwright tests
        run: pnpm exec playwright test --config=playwright.config.cjs
        shell: bash

      - name: Debug server logs on failure
        if: failure()
        run: |
          echo "=== Server logs (if any) ==="
          if [ -f server.log ]; then
            echo "server.log found → printing:"
            cat server.log
          else
            echo "server.log: not found"
          fi

          # also print process list and recent journalctl (if available)
          echo "=== ps aux (top lines) ==="
          ps aux | head -n 30 || true