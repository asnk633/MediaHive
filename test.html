<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
</head>
<body>
    <h1>Test Page</h1>
    <button id="testRoot">Test Root Page</button>
    <button id="testHome">Test Home Page</button>
    <div id="result"></div>

    <script>
        document.getElementById('testRoot').addEventListener('click', async () => {
            try {
                const response = await fetch('http://127.0.0.1:3001/');
                const text = await response.text();
                document.getElementById('result').innerHTML = `<h2>Root Page Response</h2><pre>${text.substring(0, 500)}...</pre>`;
            } catch (error) {
                document.getElementById('result').innerHTML = `<h2>Error</h2><pre>${error.message}</pre>`;
            }
        });

        document.getElementById('testHome').addEventListener('click', async () => {
            try {
                const response = await fetch('http://127.0.0.1:3001/home');
                const text = await response.text();
                document.getElementById('result').innerHTML = `<h2>Home Page Response</h2><pre>${text.substring(0, 500)}...</pre>`;
            } catch (error) {
                document.getElementById('result').innerHTML = `<h2>Error</h2><pre>${error.message}</pre>`;
            }
        });
    </script>
</body>
</html>
